{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada</title>
    <link rel="icon" type="image/png" href="{% static 'images/icesi.png' %}?v=6">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 36px 16px 48px;
        }

        .logo-top {
            height: 80px;
            margin-bottom: 40px;
        }

        .image-wrap {
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            width: 100%;
            max-width: 1100px;
        }

        .logo-big {
            width: 100%;
            max-width: 1100px;
            display: block;
        }

        .error-text {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            color: #4b5563;
        }

        .btn-dashboard {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #7c6fd9;
            color: white;
            border: none;
            cursor: pointer;
            padding: 13px 32px;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            font-weight: 600;
            margin-top: 32px;
            transition: background-color 0.2s ease;
        }

        .btn-dashboard:hover {
            background-color: #6c5db8;
        }
    </style>
</head>
<body>

    <img src="{% static 'images/logo.png' %}" alt="Consultorio Jurídico" class="logo-top">

    <div class="image-wrap">
        <img src="{% static 'images/Error-andy-D2.png' %}" alt="Error" class="logo-big">
        <p class="error-text">Lo sentimos, la página que buscas no existe.</p>
    </div>

    <button onclick="history.back()" class="btn-dashboard">← Volver</button>

</body>
</html>
